<script>
(function() {
  var wispColors = ['#c084fc', '#a78bfa', '#818cf8', '#fbbf24', '#f472b6', '#67e8f9'];

  var scoreColors = {
    0: '#161b22',
    1: '#f9a8d4',
    2: '#c084fc',
    3: '#818cf8',
    4: '#4f46e5',
  };
  var svgContainer = document.getElementById('contrib-svg');
  if (svgContainer) {
    var rects = svgContainer.querySelectorAll('rect');
    for (var i = 0; i < rects.length; i++) {
      var score = rects[i].getAttribute('data-score');
      if (score !== null && scoreColors[score]) {
        rects[i].setAttribute('fill', scoreColors[score]);
        rects[i].setAttribute('style', 'fill:' + scoreColors[score] + ';shape-rendering:crispedges;');
      }
    }
    var svg = svgContainer.querySelector('svg');
    if (svg) {
      svg.style.maxWidth = '100%';
      svg.style.height = 'auto';
      svg.style.borderRadius = '6px';
    }
  }
  var container = document.body;
  var activeWisps = 0;
  var maxWisps = 8;

  function spawnWisp() {
    if (activeWisps >= maxWisps) return;
    activeWisps++;

    var wisp = document.createElement('div');
    wisp.className = 'wisp';

    var color = wispColors[Math.floor(Math.random() * wispColors.length)];
    var startX = Math.random() * window.innerWidth;
    var startY = window.innerHeight * 0.4 + Math.random() * window.innerHeight * 0.5;
    var driftX = (Math.random() - 0.5) * 200;
    var riseY = -(200 + Math.random() * 400);
    var size = 3 + Math.random() * 5;
    var duration = 4 + Math.random() * 4;

    wisp.style.cssText = [
      'left:' + startX + 'px',
      'top:' + startY + 'px',
      'width:' + size + 'px',
      'height:' + size + 'px',
      'background:' + color,
      'box-shadow: 0 0 ' + (size * 3) + 'px ' + color,
      '--drift-x:' + driftX + 'px',
      '--rise-y:' + riseY + 'px',
      'animation-duration:' + duration + 's'
    ].join(';');

    wisp.addEventListener('animationend', function() {
      wisp.remove();
      activeWisps--;
    });

    container.appendChild(wisp);
  }

  function scheduleNext() {
    var delay = 2000 + Math.random() * 4000;
    setTimeout(function() {
      spawnWisp();
      scheduleNext();
    }, delay);
  }

  scheduleNext();
  spawnWisp();
})();

/* Reading progress bar */
(function() {
  var bar = document.createElement('div');
  bar.id = 'reading-progress';
  document.body.prepend(bar);

  window.addEventListener('scroll', function() {
    var scrollTop = window.scrollY;
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = progress + '%';
  });
})();

/* Scroll-triggered fade-in */
(function() {
  if (!window.IntersectionObserver) return;

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });

  document.addEventListener('DOMContentLoaded', function() {
    var targets = document.querySelectorAll(
      '.post-entry, .project-card, .section-title, .profile-bubble, #contrib-heatmap'
    );
    for (var i = 0; i < targets.length; i++) {
      targets[i].classList.add('fade-in-section');
      observer.observe(targets[i]);
    }
  });
})();
</script>
